front:
  text: 太上洞神五星讚淵二
  hash: sha256:c200707f1cbfdececac2ca900cd487c8b18b33d1a6795374da7ff8f575a47453
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0376_SJB_000-190819a, image: sjb/19/190819a.png}
body:
  text: 張平子撰東方歲星一名木星一名嗢吺斯屬東方主齊吴東方歲星實曰木精蒼帝之子大而能明所在爲福莫之與京人君至德道義常行則風雨時若百穀熟成君壽而昌人富而貞中國安樂四夷來庭君政殘暴失仁和之誠則芒角而怒宇内交爭拒諫信讒違恭肅之程則禍滿寰瀛下陵其上弟謀其兄赤黄多風多旱白黑爲水爲兵與金合而大將殞被月掩而妃后傾入太微君憂有赦在東井秦地安寧守與鬼國用斧鑕繞虚危齊地災生居房君臣咸樂留心禾黍豐盈守角忠賢薦用留尾社稷歡榮歷氐内多有喜經亢韓鄭出征入箕宫中口舌經斗吴越和平乘虚昭穆失次犯女宫掖歡情守牛饑凍虎害繞危祠祀不馨犯室陰陽皆速守壁堯舜同聲入奎有道者用經婁致命者行守胃人多饑疾在昴王者嚴刑逆行爲災爲賊晝見主柔臣横犯畢守婁災及人牛乘觜入井獄訴兵愁繞天屍者過半犯柳五穀繁稠留張君臣和悅入翼穀損人流繞軫野有喪病犯房將相皆憂勗哉有土君子慎獨綏撫𢘩婺增修景福神理祐善懲惡窒慾敬奉三光克修永穀木星所到分野順行色青爲福爲慶如官益禄逆行色變爲灾與土同到人生宿亦如之其禳法宜栽種五菓樹木又宜懸青旛著青衣則吉南方熒惑星一名火星一名雲漢一名罰星屬南方楚越南方之精亦曰罰星赤帝之子主察視明每年十月十一月入太微宫而受制過有道之野不停伺無道之國出入何常勾犯爲禍環繞爲殃出則兵動入則兵藏周旋止息爲病爲喪由人君之慢易俾臣下之灾傷或進或退大小無常爲水爲旱豐儉迭興每晨見而行疾及昏出而漸昇出處失度乍存乍亡有怒有勃或角或芒入太微魏文侯殂落犯紫微野死之王守天江河津泛溢在胃宿天下空倉遶羽林禁兵必起留張宿歲美人康入南斗災及宰相犯東井水火之𦍙守少微處士被厄繞天圍萬姓饑荒環鬼兵喪並起入昴胡虜潜藏居心星王者惡之陵軒轅妃后憂惶犯室米貴十倍乘危兵起南鄉在尾人臣不順入角將軍誅傷勾亢漂没城邑犯鬼死者相望留奎父不親子犯駟臣叛於王凌空國君自出守畢邊有兵降入璧賢士不顯留參兵連四方抵女布帛湧貴守牛六畜屍僵勾柳饑旱失地犯角兵起蕭墻入軫人皆從役犯婁出兵爲彊逆行于斗環繞於房股肱出走父子分張經天海内鼎沸留箕人食糟糠有土之君于何不臧克己復禮其後必昌君父居上宜修景福爲臣爲子如臨泉谷妖禍自滅永終天禄火星臨分野土地多爲火災瘡腫口舌移改及下人謀上驚恐之厄到人本命令人心狂熱疾慎弓箭刀杖損傷見血之厄妖怪言語其禳法以緋衣裳受符宜施赤小豆與貧人宜懸緋旛宜造燈火功德宜轉金簡玉訣之經點星燈施觀家土則吉中央鎮星一名地侯一名雞换主周梁爰有鎮星中央土精黄帝之子地侯别名所在之國不可加兵其分無災五穀熟成人君昌樂由君之貞君若内無仁義外猶華飾其星失度爲妖爲慝上亂下争東西叛逆上天降災爲雹爲霖山崩地坼鬼哭哀吟與木相犯妃后殞傾與水相合軍敗連營抵角後宫有喜入亢萬物無成犯房兵起地動歷氐儲副歡榮守心聖主有德在尾盗賊公行繞箕水災人散入斗登位無争環牛賊臣謀主犯女暴貴縱横乘虚風寒米貴入危公役灾生犯室廣修宫殿繞壁道術彰明乘奎女貴水湧守婁奸詐臣生勾胃水饑兵亂勾昴將出西征犯畢公侯受廢乘觜邑破人驚環參大臣出使入井炎旱灾并在鬼臣佐異謀犯柳天下和平留星萬方皆理居張五穀不停入軫穀傷兵起守冀寰宇廓清掩鉞大臣誅戮犯法將相憂烹凡厥在位知幾知微克勤奉法敬天之威福延胤祚邦家之基土星鐵身所到宿分不修德政其地灾殃若宫宿闊遠灾乃十年或乃諸侯死喪百姓饑儉不順國命則興攻戰之灾土主不修令德則水旱不調蟲傷穀麥修福則加官益禄到人本命生宿則爲大灾或父母喪亡或兄弟離析失官落職發舊口舌令人孤恓其所禳法宜轉金簡玉經著皂衣服宜乘騮馬燒安息香施魚鱉食設水府醮造功德則吉西方太白星一名金星一名長庚一名那頡主西蕃胡人也太白之星少陰之精白帝之子亦曰長庚所主者義其大而明將軍之象誅罰爲名怒則芒㪍叱吒喜則斂角潜形過火凶喪相次合水遠邇加兵犯角天下兵戰入亢水賊並生守氐將軍受封居心蟲火縱横在房土功干國犯尾失政人争守箕風旱有赦入斗灾禍難平環牛地炁發泄抵女府庫皆傾乘危將軍解甲犯室武士休征入奎川源泛溢守壁國用嚴刑乘婁白衣有會入胃守内安寧犯昴胡兵大起守畢有赦兵行乘觜參野有易政歷井鬼臣將憂并入柳元戎益封留星戰死連營勾翼軫諸侯大振師旅入軒轅人主建旆懸旌守天田人受爵禄當午地戎虜肆意峥嶸失舍邪亡軍破不見殺將屠城或山崩四面執役侵貴君柔臣强兵鋒轉戰互執台權祅祥屢見臣節見虧主心邪變嗚呼有土之君股肱之臣不僣不濫敬天畏神道以理國德以匡身福留後嗣化及人民金星太白大將軍主義主伐主兵革八年一周天所臨宿分多兵革焉臨人本命宿則好邪行音樂也所禳之法宜講武教旗吉北方辰星一名水星一名嘀屬北方主燕趙北方辰星亦曰水精黑帝之子偏將之形所主者聽伺察君臣之情所在之位憂而不寧君若審其法度明其教令遠其讒邪親其忠正無縱慾逸邦家之慶君若不理城闕不任賢臣縱捨由己昵比小人上天垂象災及其鄰五穀不稔風雨不均陰陽錯亂饑寒荐臻與金合而干戈動被土犯而元戎厄睹芒角而知大小災祥審伏見察君臣譴謫暴水漲而色青大喪發而虚白其順也春晨而秋夕其爲也冬温而夏寒逼太陽而掩映接少陰而交歡守角刑速而水災留亢米穀騰湧在心天下太平守房奸臣謀動居尾江海横流入箕大人憂懼犯虚宿萬里赤地乘斗牛百川决壅凌女布帛倍貴守危亂臣繼纏入奎臣下被囚守胃兵水人愁繞畢邊兵驚速在昴執政刑流勾觜兵災爲孽入井水土相讎乘參入鬼水災兵起疾疫多憂留柳星貴臣得罪守軫翼宗廟宜修逼太微群臣相害守軒轅后族多仇入壁朝廷咸懼犯氐獄訴稽留居張貴臣專國犯室后黨被收守婁水敗萬物在建相讚難休緬惟有土敬慎其儀兢兢慄慄居安苦危勤修令德福履綏之水星樞相也主天王祕要改受侯伯爵禄之事一年一周天所到分野多主水灾兵超妖言或人令心不定好食辛酸所禳之法宜築城池開渠引水則吉大上洞神五星讚
